name: Sync Data

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sync/go.mod

      - name: Run Sync
        run: go run ./cmd/sync
        working-directory: sync
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove obsolete manifest and legacy alerts file
        run: |
          rm -f ui/index/public/data/manifest.json
          rm -f ui/index/public/data/alerts.json

      - name: Commit data changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ui/index/public/data/
          git diff --staged --quiet || git commit -m "chore(data): update UI public data for $(date +%Y-%m-%d)"
          git push
